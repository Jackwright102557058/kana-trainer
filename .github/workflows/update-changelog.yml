name: Update changelog on release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Update CHANGELOG.md
        env:
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_DATE: ${{ github.event.release.published_at }}
        run: |
          python <<'PY'
          import os
          from datetime import datetime

          name = os.getenv("RELEASE_NAME", "").strip()
          tag = os.getenv("RELEASE_TAG", "").strip()
          body = os.getenv("RELEASE_BODY", "").strip()
          published = os.getenv("RELEASE_DATE", "").strip()

          version = name or tag or "Unnamed release"

          try:
              date = datetime.fromisoformat(published.replace("Z", "+00:00")).date().isoformat()
          except Exception:
              date = ""

          heading = f"## {version}"
          if date:
              heading += f" ({date})"

          new_entry = heading + "\n"
          if body:
              new_entry += body.strip() + "\n\n"
          else:
              new_entry += "- No release notes provided.\n\n"

          path = "CHANGELOG.md"

          if os.path.exists(path):
              with open(path, "r", encoding="utf-8") as f:
                  existing = f.read().strip()
          else:
              existing = "# Changelog\n\n"

          if not existing.startswith("# Changelog"):
              existing = "# Changelog\n\n" + existing

          updated = "# Changelog\n\n" + new_entry + existing[len("# Changelog"):].lstrip()

          with open(path, "w", encoding="utf-8") as f:
              f.write(updated.rstrip() + "\n")
          PY

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "Update changelog for ${{ github.event.release.tag_name }}"
          git push
